<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/adminlte/plugins/fontawesome-free/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/adminlte/css/adminlte.min.css}">
</head>

<body class="p-3">
<div class="content">
    <div class="card">
        <div class="card-header">
            <h3 class="card-title">查询条件</h3>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-3 position-relative">
                    <input id="branchName"
                           class="form-control"
                           placeholder="搜索分支名称"
                           autocomplete="off"
                           oninput="searchBranch()">

                    <!-- 搜索结果下拉 -->
                    <div id="branchDropdown"
                         class="list-group position-absolute w-100"
                         style="z-index: 9999; display: none; max-height: 200px; overflow-y: auto;">
                    </div>
                </div>


                <div class="col-md-2">
                    <input id="adcode" class="form-control" placeholder="行政区划 adcode">
                </div>

                <div class="col-md-2">
                    <input id="projectId" class="form-control" placeholder="项目ID">
                </div>

                <div class="col-md-3">
                    <input id="taskFrameId" class="form-control" placeholder="任务框ID">
                </div>

                <div class="col-md-2">
                    <button class="btn btn-primary btn-block" onclick="loadData()">
                        <i class="fas fa-search"></i> 查询
                    </button>
                </div>
            </div>
        </div>

    </div>

    <div class="card">
        <div class="card-body table-responsive p-0">
            <table class="table table-bordered table-hover">
                <thead>
                <tr>
                    <th>分支</th>
                    <th>任务框ID</th>
                    <th>行政区划</th>
                    <th>项目ID</th>
                    <th>任务ID</th>
                    <th>数据键</th>
                    <th>更新时间</th>
                    <th>状态</th>
                    <th style="width: 120px">操作</th>
                </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

    <!-- 分页 -->
    <div class="card">
        <div class="card-body clearfix">
            <ul class="pagination pagination-sm m-0 float-right" id="pagination">
                <!-- JS 动态生成 -->
            </ul>
        </div>
    </div>

</div>

<script th:src="@{/jquery/jquery.min.js}"></script>
<script th:src="@{/adminlte/js/adminlte.min.js}"></script>
<script>

let branchSearchTimer = null;
let pageNumber = 1;
let pageSize = 20;
let totalPages = 1;

$(function () {
    // DOM Ready
    loadData();
});

function searchBranch() {
    const keyword = $('#branchName').val();

    if (!keyword || keyword.length < 1) {
        $('#branchDropdown').hide();
        return;
    }

    // 防抖，避免疯狂请求
    clearTimeout(branchSearchTimer);
    branchSearchTimer = setTimeout(() => {
        $.ajax({
            url: '/branches',
            method: 'GET',
            data: {
                branchName: keyword,
                businessType: 'hdmap'
            },
            success: function (res) {
                const list = res.data || [];
                renderBranchDropdown(list);
            }
        });
    }, 300);
}

function renderBranchDropdown(list) {
    const $dropdown = $('#branchDropdown');
    $dropdown.empty();

    if (list.length === 0) {
        $dropdown.hide();
        return;
    }

    list.forEach(item => {
        const el = $(`
            <a href="javascript:void(0)"
               class="list-group-item list-group-item-action">
                <strong>${item.branchName}</strong>
                <small class="text-muted ml-2">${item.businessType}</small>
            </a>
        `);

        el.on('click', function () {
            $('#branchName').val(item.branchName);
            $dropdown.hide();
        });

        $dropdown.append(el);
    });

    $dropdown.show();
}

$(document).on('click', function (e) {
    if (!$(e.target).closest('#branchName').length) {
        $('#branchDropdown').hide();
    }
});


function loadData(page) {
    if (page) {
        pageNumber = page;
    }

    const req = {
        pageNumber: pageNumber,
        pageSize: pageSize,
        showDisable: true
    };

    const branchName = $('#branchName').val();
    const taskFrameId = $('#taskFrameId').val();
    const projectId = $('#projectId').val();
    const adcode = $('#adcode').val();

    // 以下字段：有值才传，严格匹配后端校验逻辑
    if (branchName) {
        req.branchName = branchName;
    }
    if (taskFrameId) {
        req.taskFrameIds = [taskFrameId];
    }
    if (projectId) {
        req.projectIds = [projectId];
    }
    if (adcode) {
        req.adcode = adcode;
    }

    $.ajax({
        url: '/branches-bindings/_query',
        method: 'POST',
        contentType: 'application/json',
        data: JSON.stringify(req),
        success: function (res) {
            const data = res.data || {};
            const list = data.content || [];
            const total = data.totalElements || 0;
            renderTable(list);
            renderPagination(total);
        }
    });
}

function toggle(branch, taskFrameId, disable) {
    $.post({
        url: '/branches-bindings/updates',
        contentType: 'application/json',
        data: JSON.stringify({
            branchName: branch,
            disable: disable,
            taskFrameIds: [taskFrameId]
        }),
        success() { loadData() }
    })
}

function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    const pad = n => n < 10 ? '0' + n : n;
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}
            ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
}


function renderDataKeys(dataKeys) {
    if (!dataKeys) return '';
    return Object.keys(dataKeys)
        .map(k => `${k}: ${dataKeys[k]}`)
        .join('<br/>');
}


function renderTable(list) {
    let html = '';

    if (list.length === 0) {
        html = '<tr><td colspan="9" class="text-center text-muted">暂无数据</td></tr>';
        $('#tbody').html(html);
        return;
    }

    list.forEach(r => {
        html += `<tr>
            <td>${r.branchName}</td>
            <td style="word-break: break-all">${r.taskFrameId}</td>
            <td>${r.adcode || ''}</td>
            <td>${r.projectId || ''}</td>
            <td>${r.taskId || ''}</td>
            <td>${renderDataKeys(r.dataKeys)}</td>
            <td>${formatTime(r.updateTime)}</td>
            <td>
                <span class="badge ${r.disable ? 'badge-danger' : 'badge-success'}">
                    ${r.disable ? '禁用' : '启用'}
                </span>
            </td>
            <td>
                <button class="btn btn-xs ${r.disable ? 'btn-success' : 'btn-warning'}"
                        onclick="toggle('${r.branchName}','${r.taskFrameId}',${!r.disable})">
                    ${r.disable ? '启用' : '禁用'}
                </button>
            </td>
        </tr>`;
    });

    $('#tbody').html(html);
}


function renderPagination(total) {
    totalPages = Math.ceil(total / pageSize);
    let html = '';

    if (totalPages <= 1) {
        $('#pagination').html('');
        return;
    }

    // 上一页
    html += `
        <li class="page-item ${pageNumber === 1 ? 'disabled' : ''}">
            <a class="page-link" href="javascript:void(0)"
               onclick="loadData(${pageNumber - 1})">«</a>
        </li>
    `;

    // 页码（最多显示 5 个）
    const start = Math.max(1, pageNumber - 2);
    const end = Math.min(totalPages, pageNumber + 2);

    for (let i = start; i <= end; i++) {
        html += `
            <li class="page-item ${i === pageNumber ? 'active' : ''}">
                <a class="page-link" href="javascript:void(0)"
                   onclick="loadData(${i})">${i}</a>
            </li>
        `;
    }

    // 下一页
    html += `
        <li class="page-item ${pageNumber === totalPages ? 'disabled' : ''}">
            <a class="page-link" href="javascript:void(0)"
               onclick="loadData(${pageNumber + 1})">»</a>
        </li>
    `;

    $('#pagination').html(html);
}

</script>

</body>
</html>
