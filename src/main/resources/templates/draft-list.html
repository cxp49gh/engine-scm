<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>模板草稿管理 - Engine SCM</title>
    
    <!-- AdminLTE CSS (CDN) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2.0/dist/css/adminlte.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <!-- DataTables -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/datatables.net-bs4@1.13.5/css/dataTables.bootstrap4.min.css">
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.12/dist/sweetalert2.min.css">
    
    <style>
        .status-badge { padding: 5px 10px; border-radius: 4px; font-size: 12px; }
        .status-DRAFT { background: #17a2b8; color: white; }
        .status-LOCKED { background: #ffc107; color: black; }
        .status-DEPRECATED { background: #6c757d; color: white; }
        .json-editor { font-family: 'Courier New', monospace; font-size: 12px; min-height: 120px; }
        .table-actions { white-space: nowrap; }
        .table-actions .btn { margin: 0 2px; }
    </style>
</head>
<body class="hold-transition sidebar-mini">
<div class="wrapper">

    <!-- Navbar -->
    <nav class="main-header navbar navbar-expand navbar-white navbar-light">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" data-widget="pushmenu" href="#"><i class="fas fa-bars"></i></a>
            </li>
            <li class="nav-item d-none d-sm-inline-block">
                <a href="/" class="nav-link">首页</a>
            </li>
            <li class="nav-item d-none d-sm-inline-block">
                <a href="/templates/drafts" class="nav-link active">模板草稿管理</a>
            </li>
        </ul>
    </nav>

    <!-- Main Sidebar -->
    <aside class="main-sidebar sidebar-dark-primary elevation-4">
        <a href="/" class="brand-link">
            <i class="fas fa-cog brand-image elevation-3" style="opacity: .8"></i>
            <span class="brand-text font-weight-light">Engine SCM</span>
        </a>
        <div class="sidebar">
            <nav class="mt-2">
                <ul class="nav nav-pills nav-sidebar flex-column" data-widget="treeview" role="menu">
                    <li class="nav-item">
                        <a href="/templates/drafts" class="nav-link active">
                            <i class="nav-icon fas fa-file-alt"></i>
                            <p>模板草稿管理</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/templates/snapshots" class="nav-link">
                            <i class="nav-icon fas fa-camera"></i>
                            <p>模板快照</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/templates/publish" class="nav-link">
                            <i class="nav-icon fas fa-upload"></i>
                            <p>模板发布</p>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="/templates/dry-run" class="nav-link">
                            <i class="nav-icon fas fa-vial"></i>
                            <p>预发布校验</p>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </aside>

    <!-- Content Wrapper -->
    <div class="content-wrapper">
        <section class="content-header">
            <div class="container-fluid">
                <div class="row mb-2">
                    <div class="col-sm-6">
                        <h1>模板草稿管理</h1>
                    </div>
                    <div class="col-sm-6">
                        <ol class="breadcrumb float-sm-right">
                            <li class="breadcrumb-item"><a href="/">首页</a></li>
                            <li class="breadcrumb-item active">模板草稿管理</li>
                        </ol>
                    </div>
                </div>
            </div>
        </section>

        <section class="content">
            <div class="container-fluid">
                <!-- Search Form -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title"><i class="fas fa-search"></i> 查询条件</h3>
                    </div>
                    <div class="card-body">
                        <form id="searchForm" class="form-inline">
                            <div class="form-group mx-2">
                                <label for="searchBizCode">业务维度: </label>
                                <input type="text" class="form-control ml-2" id="searchBizCode" placeholder="请输入业务维度">
                            </div>
                            <div class="form-group mx-2">
                                <label for="searchStatus">状态: </label>
                                <select class="form-control ml-2" id="searchStatus">
                                    <option value="">全部</option>
                                    <option value="DRAFT">草稿</option>
                                    <option value="LOCKED">已锁定</option>
                                    <option value="DEPRECATED">已废弃</option>
                                </select>
                            </div>
                            <button type="button" class="btn btn-primary mx-2" onclick="searchDrafts()">
                                <i class="fas fa-search"></i> 查询
                            </button>
                            <button type="button" class="btn btn-secondary mx-2" onclick="resetSearch()">
                                <i class="fas fa-redo"></i> 重置
                            </button>
                        </form>
                    </div>
                </div>

                <!-- Data Table -->
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">
                            <i class="fas fa-list"></i> 草稿列表
                        </h3>
                        <div class="card-tools">
                            <button type="button" class="btn btn-success btn-sm" onclick="showCreateModal()">
                                <i class="fas fa-plus"></i> 新建草稿
                            </button>
                        </div>
                    </div>
                    <div class="card-body">
                        <table id="draftTable" class="table table-bordered table-striped" style="width:100%">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>业务维度</th>
                                    <th>引擎维度</th>
                                    <th>环节</th>
                                    <th>模板名称</th>
                                    <th>版本</th>
                                    <th>状态</th>
                                    <th>创建时间</th>
                                    <th>更新时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <footer class="main-footer">
        <div class="float-right d-none d-sm-block">
            <b>Version</b> 1.0.x
        </div>
        <strong>Copyright &copy; 2026 Engine SCM</strong>
    </footer>
</div>

<!-- Create/Edit Modal -->
<div class="modal fade" id="draftModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title" id="modalTitle">新建草稿</h4>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="draftForm">
                    <input type="hidden" id="draftId">
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>业务维度 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="bizCode" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>引擎维度 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="engineCode" required>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>环节 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="linkCode" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>模板名称 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" id="name" required>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-12">
                            <div class="form-group">
                                <label>描述</label>
                                <textarea class="form-control" id="description" rows="2"></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>版本号</label>
                                <input type="text" class="form-control" id="currentVersion" placeholder="如: v1.0">
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-group">
                                <label>运行时参数定义引用</label>
                                <input type="text" class="form-control" id="runtimeParamDefRef">
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-12">
                            <div class="form-group">
                                <label>模板内容 (JSON)</label>
                                <textarea class="form-control json-editor" id="templateContent" rows="8" placeholder='{"key": "value"}'></textarea>
                            </div>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-12">
                            <div class="form-group">
                                <label>默认参数 (JSON)</label>
                                <textarea class="form-control json-editor" id="defaultParams" rows="4" placeholder='{"param1": "value1"}'></textarea>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveDraft()">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- View Modal -->
<div class="modal fade" id="viewModal" tabindex="-1" role="dialog">
    <div class="modal-dialog modal-xl">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title">草稿详情</h4>
                <button type="button" class="close" data-dismiss="modal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col-md-6">
                        <table class="table table-bordered">
                            <tr><th>ID</th><td id="viewId"></td></tr>
                            <tr><th>业务维度</th><td id="viewBizCode"></td></tr>
                            <tr><th>引擎维度</th><td id="viewEngineCode"></td></tr>
                            <tr><th>环节</th><td id="viewLinkCode"></td></tr>
                            <tr><th>模板名称</th><td id="viewName"></td></tr>
                        </table>
                    </div>
                    <div class="col-md-6">
                        <table class="table table-bordered">
                            <tr><th>版本</th><td id="viewVersion"></td></tr>
                            <tr><th>状态</th><td id="viewStatus"></td></tr>
                            <tr><th>创建时间</th><td id="viewCreatedAt"></td></tr>
                            <tr><th>更新时间</th><td id="viewUpdatedAt"></td></tr>
                        </table>
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-md-12">
                        <div class="form-group">
                            <label>描述</label>
                            <p id="viewDescription" class="form-control-static"></p>
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>模板内容</label>
                            <pre id="viewTemplateContent" class="bg-light p-3" style="max-height: 300px; overflow: auto; font-size: 12px;"></pre>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>默认参数</label>
                            <pre id="viewDefaultParams" class="bg-light p-3" style="max-height: 300px; overflow: auto; font-size: 12px;"></pre>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>

<!-- jQuery -->
<script src="https://cdn.jsdelivr.net/npm/jquery@3.6.4/dist/jquery.min.js"></script>
<!-- Bootstrap 4 -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<!-- AdminLTE App -->
<script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2.0/dist/js/adminlte.min.js"></script>
<!-- DataTables -->
<script src="https://cdn.jsdelivr.net/npm/datatables.net@1.13.5/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/datatables.net-bs4@1.13.5/js/dataTables.bootstrap4.min.js"></script>
<!-- SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.7.12/dist/sweetalert2.min.js"></script>

<script>
let table;

$(function() {
    initDataTable();
});

function initDataTable() {
    table = $('#draftTable').DataTable({
        language: {
            url: 'https://cdn.jsdelivr.net/npm/datatables.net-plugins/i18n/zh-CN.json'
        },
        processing: true,
        serverSide: false,
        ajax: {
            url: '/api/templates/drafts',
            dataSrc: ''
        },
        columns: [
            { data: 'id', visible: false },
            { data: 'bizCode' },
            { data: 'engineCode' },
            { data: 'linkCode' },
            { data: 'name' },
            { data: 'currentVersion' },
            { 
                data: 'status',
                render: function(data) {
                    return '<span class="status-badge status-' + data + '">' + getStatusText(data) + '</span>';
                }
            },
            { 
                data: 'createdAt',
                render: function(data) {
                    return data ? new Date(data).toLocaleString('zh-CN') : '-';
                }
            },
            { 
                data: 'updatedAt',
                render: function(data) {
                    return data ? new Date(data).toLocaleString('zh-CN') : '-';
                }
            },
            {
                data: null,
                render: function(data, type, row) {
                    let buttons = '<div class="table-actions">';
                    buttons += '<button class="btn btn-info btn-sm" onclick="viewDraft(\'' + row.id + '\')" title="查看"><i class="fas fa-eye"></i></button> ';
                    buttons += '<button class="btn btn-primary btn-sm" onclick="editDraft(\'' + row.id + '\')" title="编辑"><i class="fas fa-edit"></i></button> ';
                    if (row.status === 'DRAFT') {
                        buttons += '<button class="btn btn-warning btn-sm" onclick="lockDraft(\'' + row.id + '\')" title="锁定"><i class="fas fa-lock"></i></button> ';
                    }
                    buttons += '<button class="btn btn-danger btn-sm" onclick="deleteDraft(\'' + row.id + '\')" title="删除"><i class="fas fa-trash"></i></button>';
                    buttons += '</div>';
                    return buttons;
                }
            }
        ]
    });
}

function getStatusText(status) {
    const map = { 'DRAFT': '草稿', 'LOCKED': '已锁定', 'DEPRECATED': '已废弃' };
    return map[status] || status;
}

function searchDrafts() {
    const bizCode = $('#searchBizCode').val();
    const status = $('#searchStatus').val();
    
    let url = '/api/templates/drafts?';
    if (bizCode) url += 'bizCode=' + bizCode + '&';
    if (status) url += 'status=' + status;
    
    table.ajax.url(url).load();
}

function resetSearch() {
    $('#searchForm')[0].reset();
    table.ajax.url('/api/templates/drafts').load();
}

function showCreateModal() {
    $('#modalTitle').text('新建草稿');
    $('#draftForm')[0].reset();
    $('#draftId').val('');
    $('#draftModal').modal('show');
}

function saveDraft() {
    const id = $('#draftId').val();
    let templateContent = {};
    let defaultParams = {};
    
    try {
        templateContent = JSON.parse($('#templateContent').val() || '{}');
    } catch(e) {
        Swal.fire('错误', '模板内容 JSON 格式不正确', 'error');
        return;
    }
    
    try {
        defaultParams = JSON.parse($('#defaultParams').val() || '{}');
    } catch(e) {
        Swal.fire('错误', '默认参数 JSON 格式不正确', 'error');
        return;
    }
    
    const data = {
        bizCode: $('#bizCode').val(),
        engineCode: $('#engineCode').val(),
        linkCode: $('#linkCode').val(),
        name: $('#name').val(),
        description: $('#description').val(),
        currentVersion: $('#currentVersion').val(),
        runtimeParamDefRef: $('#runtimeParamDefRef').val(),
        templateContent: templateContent,
        defaultParams: defaultParams,
        status: 'DRAFT'
    };
    
    if (!data.bizCode || !data.engineCode || !data.linkCode || !data.name) {
        Swal.fire('错误', '请填写必填字段', 'error');
        return;
    }
    
    const url = id ? '/api/templates/drafts/' + id : '/api/templates/drafts';
    const method = id ? 'PUT' : 'POST';
    
    fetch(url, {
        method: method,
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {
        $('#draftModal').modal('hide');
        table.ajax.reload();
        Swal.fire('成功', id ? '更新成功' : '创建成功', 'success');
    })
    .catch(error => {
        Swal.fire('错误', '操作失败: ' + error.message, 'error');
    });
}

function viewDraft(id) {
    fetch('/api/templates/drafts/' + id)
        .then(response => response.json())
        .then(data => {
            $('#viewId').text(data.id);
            $('#viewBizCode').text(data.bizCode);
            $('#viewEngineCode').text(data.engineCode);
            $('#viewLinkCode').text(data.linkCode);
            $('#viewName').text(data.name);
            $('#viewVersion').text(data.currentVersion || '-');
            $('#viewStatus').html('<span class="status-badge status-' + data.status + '">' + getStatusText(data.status) + '</span>');
            $('#viewCreatedAt').text(data.createdAt ? new Date(data.createdAt).toLocaleString('zh-CN') : '-');
            $('#viewUpdatedAt').text(data.updatedAt ? new Date(data.updatedAt).toLocaleString('zh-CN') : '-');
            $('#viewDescription').text(data.description || '-');
            $('#viewTemplateContent').text(data.templateContent ? JSON.stringify(data.templateContent, null, 2) : '-');
            $('#viewDefaultParams').text(data.defaultParams ? JSON.stringify(data.defaultParams, null, 2) : '-');
            $('#viewModal').modal('show');
        });
}

function editDraft(id) {
    fetch('/api/templates/drafts/' + id)
        .then(response => response.json())
        .then(data => {
            $('#modalTitle').text('编辑草稿');
            $('#draftId').val(data.id);
            $('#bizCode').val(data.bizCode);
            $('#engineCode').val(data.engineCode);
            $('#linkCode').val(data.linkCode);
            $('#name').val(data.name);
            $('#description').val(data.description);
            $('#currentVersion').val(data.currentVersion);
            $('#runtimeParamDefRef').val(data.runtimeParamDefRef);
            $('#templateContent').val(data.templateContent ? JSON.stringify(data.templateContent, null, 2) : '{}');
            $('#defaultParams').val(data.defaultParams ? JSON.stringify(data.defaultParams, null, 2) : '{}');
            $('#draftModal').modal('show');
        });
}

function lockDraft(id) {
    Swal.fire({
        title: '确认锁定',
        text: '确定要锁定这个草稿吗？',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: '确认',
        cancelButtonText: '取消'
    }).then(result => {
        if (result.isConfirmed) {
            fetch('/api/templates/drafts/' + id + '/lock', { method: 'POST' })
                .then(response => response.json())
                .then(data => {
                    table.ajax.reload();
                    Swal.fire('成功', '锁定成功', 'success');
                });
        }
    });
}

function deleteDraft(id) {
    Swal.fire({
        title: '确认删除',
        text: '确定要删除这个草稿吗？此操作不可恢复！',
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: '删除',
        cancelButtonText: '取消',
        confirmButtonColor: '#d33'
    }).then(result => {
        if (result.isConfirmed) {
            fetch('/api/templates/drafts/' + id, { method: 'DELETE' })
                .then(response => {
                    table.ajax.reload();
                    Swal.fire('成功', '删除成功', 'success');
                });
        }
    });
}
</script>
</body>
</html>
