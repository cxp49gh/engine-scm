<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>数据分支管理系统</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="/adminlte/plugins/fontawesome-free/css/all.min.css">
    <link rel="stylesheet" href="/adminlte/css/adminlte.min.css">
</head>

<body class="hold-transition layout-top-nav">
<div class="wrapper">

    <!-- 顶部导航 -->
    <nav class="main-header navbar navbar-expand-md navbar-light navbar-white">
        <div class="container">

            <!-- Logo -->
            <a href="#" class="navbar-brand">
                <span class="brand-text font-weight-light">数据分支管理系统</span>
            </a>

            <!-- 折叠按钮（小屏） -->
            <button class="navbar-toggler order-1" type="button"
                    data-toggle="collapse" data-target="#topNavMenu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- 菜单 -->
            <div class="collapse navbar-collapse order-3" id="topNavMenu">
                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a href="#" class="nav-link active"
                           onclick="loadPage(this, '/welcome')">
                            <i class="fas fa-home mr-1"></i> 首页
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="#" class="nav-link"
                           onclick="loadPage(this, '/page/branches-bindings')">
                            <i class="fas fa-code-branch mr-1"></i> 分支绑定管理
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="#" class="nav-link"
                           onclick="loadPage(this, '/page/branches')">
                            <i class="fas fa-copy mr-1"></i> 分支绑定管理
                        </a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- 内容区域 -->
    <div class="content-wrapper">
        <iframe id="mainFrame"
                src="/welcome"
                style="width:100%;height:calc(100vh - 56px);border:none;">
        </iframe>
    </div>

    <footer class="main-footer text-sm text-center">
        © 2025 Branch Management System
    </footer>

</div>

<script src="/jquery/jquery.min.js"></script>
<script src="/adminlte/js/adminlte.min.js"></script>

<script>
    function loadPage(el, url) {
        $('#mainFrame').attr('src', url);
        $('.nav-link').removeClass('active');
        $(el).addClass('active');
    }
</script>

</body>
</html>
